services:
  kafka:
    image: apache/kafka:3.9.1
    hostname: kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "127.0.0.1:29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    restart: "no"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/alerts.db}
      RUNBOOK_PDF_DIR: /app/runbooks/pdfs
      RUNTIME_SETTINGS_PATH: /app/data/runtime-settings.json
    volumes:
      - ./data:/app/data
      - ./runbooks:/app/runbooks:ro
    command: ["alembic", "upgrade", "head"]

  api:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/alerts.db}
      RUNBOOK_PDF_DIR: /app/runbooks/pdfs
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ENABLED: "true"
      HTTP_SCHEDULER: kafka
      RUNTIME_SETTINGS_PATH: /app/data/runtime-settings.json
      CORS_ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    volumes:
      - ./data:/app/data
      - ./runbooks:/app/runbooks:ro
    ports:
      # Keep the unauthenticated alert/read API on the local host. Route remote
      # alert platforms and operators through an authenticated gateway.
      - "127.0.0.1:8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 10

  worker:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "app.workers.kafka"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/alerts.db}
      RUNBOOK_PDF_DIR: /app/runbooks/pdfs
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RUNTIME_SETTINGS_PATH: /app/data/runtime-settings.json
    volumes:
      - ./data:/app/data
      - ./runbooks:/app/runbooks:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  kafka-data:
