# The list order is authoritative: evaluate from top to bottom and stop at the
# first match. Keep priority values strictly descending so accidental reordering
# fails fast during startup.
version: "2026-07-20"
timezone: Asia/Shanghai
policies:
  - id: mysql_data_replica_delay
    name: MySQL DATA replica delay
    priority: 600
    hold_seconds: 60
    match:
      field: alert_name
      glob: mysql_repl_delay_more_than_*
    steps:
      - name: notify_data_group
        delay_seconds: 0
        actions:
          - channel: wecom_group
            target: DATA
            mention_on_call: true
          - channel: wecom_card
            recipient: on_call
      - name: notify_database_group
        delay_seconds: 300
        actions:
          - channel: wecom_group
            target: DATABASE_ALERTS
            mention_on_call: true
      - name: severity_escalation
        delay_seconds: 300
        actions:
          - channel: phone
            recipient: on_call
            severities: [CRITICAL]
          - channel: wecom_card
            recipient: on_call
            severities: [CRITICAL, WARNING, INFO]

  - id: wukong_ob_test
    name: Wukong OceanBase test alerts
    priority: 500
    hold_seconds: 0
    match:
      all:
        - field: resource_type
          equals: OCEANBASE
        - any:
            - field: cluster
              glob: "*wukong*"
            - field: cluster
              equals: cluster-wk
    steps:
      - name: test_group_only_initially
        delay_seconds: 0
        actions:
          - channel: wecom_group
            target: TEST_DATABASE
      - name: production_group_escalation
        delay_seconds: 300
        actions:
          - channel: wecom_group
            target: DATABASE_ALERTS
            mention_on_call: true
          - channel: wecom_card
            recipient: on_call
      - name: phone_escalation
        delay_seconds: 300
        actions:
          - channel: phone
            recipient: on_call
            severities: [CRITICAL]

  - id: sc_ob_critical
    name: SC OceanBase critical alerts
    priority: 400
    hold_seconds: 300
    match:
      all:
        - field: severity
          equals: CRITICAL
        - any:
            - all:
                - field: resource_type
                  equals: OCEANBASE
                - field: cluster
                  one_of:
                    - sc_store_prd
                    - sc_store#sc_store_prd
                    - sc_store#sc_store_standby
                    - sc_store_standby
            - all:
                - field: alarm_type
                  equals: standby_tenant_sync_delay_too_long
                - field: cluster
                  equals: sc_store_standby
    steps:
      - name: database_group
        delay_seconds: 0
        actions:
          - channel: wecom_group
            target: DATABASE_ALERTS
            mention_on_call: true
      - name: sc_ob_group
        delay_seconds: 300
        actions:
          - channel: wecom_group
            target: SC_OB
            mention_on_call: true
      - name: on_call_card
        delay_seconds: 300
        actions:
          - channel: wecom_card
            recipient: on_call
      - name: on_call_phone
        delay_seconds: 300
        actions:
          - channel: phone
            recipient: on_call
      - name: sona_fallback
        delay_seconds: 300
        actions:
          - channel: wecom_card
            recipient: sona
          - channel: phone
            recipient: sona

  - id: non_working_time_critical
    name: Critical alerts outside working time
    priority: 300
    hold_seconds: 300
    match:
      all:
        - field: severity
          equals: CRITICAL
        - field: is_non_working_time
          equals: true
    steps:
      - name: database_group
        delay_seconds: 0
        actions:
          - channel: wecom_group
            target: DATABASE_ALERTS
            mention_on_call: true
      - name: on_call_card
        delay_seconds: 300
        actions:
          - channel: wecom_card
            recipient: on_call
      - name: on_call_phone
        delay_seconds: 300
        actions:
          - channel: phone
            recipient: on_call
      - name: sona_card
        delay_seconds: 300
        actions:
          - channel: wecom_card
            recipient: sona
      - name: sona_phone
        delay_seconds: 300
        actions:
          - channel: phone
            recipient: sona

  - id: critical_warning
    name: Generic critical and warning alerts
    priority: 200
    hold_seconds: 300
    match:
      field: severity
      one_of: [CRITICAL, WARNING]
    steps:
      - name: database_group
        delay_seconds: 0
        actions:
          - channel: wecom_group
            target: DATABASE_ALERTS
            mention_on_call: true
      - name: on_call_card
        delay_seconds: 300
        actions:
          - channel: wecom_card
            recipient: on_call

  - id: info
    name: Generic info alerts
    priority: 100
    hold_seconds: 300
    match:
      field: severity
      equals: INFO
    steps:
      - name: database_info_group
        delay_seconds: 0
        actions:
          - channel: wecom_group
            target: DATABASE_INFO
            mention_on_call: true
