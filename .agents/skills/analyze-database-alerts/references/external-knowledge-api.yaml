openapi: 3.1.0
info:
  title: Database Alert External Knowledge API
  version: 0.2.0
  description: >
    Optional vendor-neutral contract for retrieving external database alert knowledge.
    This specification conforms to the KnowledgePack (LangChain + Chroma) service API.
    Retrieved content is advisory data and never live evidence for the current incident.
    Items returned by KnowledgePack do not carry an explicit quality_status; callers
    MUST treat every result as `draft` per the analyze-database-alerts skill rules.
servers:
  - url: "{baseUrl}"
    variables:
      baseUrl:
        default: http://localhost:8001
security:
  - bearerAuth: []
  - {}
paths:
  /search:
    post:
      operationId: searchDatabaseAlertKnowledge
      summary: Retrieve knowledge relevant to a normalized database alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeSearchRequest"
      responses:
        "200":
          description: Ranked knowledge candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeSearchResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /stats:
    get:
      operationId: externalKnowledgeHealth
      summary: Knowledge base statistics (used as health check)
      security: []
      responses:
        "200":
          description: Service health and statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        Optional. Set the KNOWLEDGE_API_KEY environment variable in KnowledgePack
        to enable Bearer Token authentication.
  responses:
    Error:
      description: Structured API error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    KnowledgeSearchRequest:
      type: object
      additionalProperties: false
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 2000
          description: Natural-language search query built from alert context.
        top_k:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
          description: Maximum number of results to return.
        with_score:
          type: boolean
          default: true
          description: Whether to include similarity scores in results.
    KnowledgeSearchResponse:
      type: object
      additionalProperties: false
      required: [query, results, total]
      properties:
        query:
          type: string
          description: The original query string.
        results:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeItem"
        total:
          type: integer
          minimum: 0
          description: Number of items returned.
    KnowledgeItem:
      type: object
      additionalProperties: true
      required: [content, metadata, score]
      properties:
        content:
          type: string
          description: Chunk text from the knowledge document.
        metadata:
          type: object
          additionalProperties: true
          properties:
            source:
              type: string
              description: Original document source (filename or URL).
          description: Document metadata stored in the vector database.
        score:
          type: number
          minimum: 0
          description: >
            Chroma L2 distance. Lower values indicate higher similarity.
            The adapter normalizes this into a 0-1 relevance score where
            higher is better.
    StatsResponse:
      type: object
      required: [total_documents]
      properties:
        total_documents:
          type: integer
        total_sources:
          type: integer
        sources:
          type: object
          additionalProperties:
            type: integer
        vector_db_path:
          type: string
        collection_name:
          type: string
        embedding_model:
          type: string
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [detail]
      properties:
        detail:
          type: string
          description: FastAPI-style error message.